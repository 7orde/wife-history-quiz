<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
   
    <script src="https://cdn.tailwindcss.com"></script>
   
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <title>History Timeline Quiz</title>
    <style>
        * {
            font-family: 'Poppins', sans-serif;
        }

        body {
            background: #141314;
        }

        .quiz-card {
            background: #1a1a1a;
            border: 1px solid #333;
        }

        input[type="range"] {
            appearance: none;
            -webkit-appearance: none;
            width: 100%;
            height: 6px;
            border-radius: 3px;
            background: #333;
            outline: none;
            -webkit-slider-thumb-appearance: none;
        }

        input[type="range"]::-webkit-slider-thumb {
            appearance: none;
            -webkit-appearance: none;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: #ffffff;
            cursor: pointer;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.5);
            transition: all 0.2s ease;
        }

        input[type="range"]::-webkit-slider-thumb:hover {
            transform: scale(1.1);
        }

        input[type="range"]::-moz-range-thumb {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: #ffffff;
            cursor: pointer;
            border: none;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.5);
            transition: all 0.2s ease;
        }

        input[type="range"]::-moz-range-thumb:hover {
            transform: scale(1.1);
        }

        .timeline-line {
            position: relative;
            height: 2px;
            background: #333;
            margin: 2rem 0 1rem 0;
        }

        .timeline-tick {
            position: absolute;
            width: 2px;
            height: 20px;
            background: #555;
            top: -9px;
        }

        .timeline-label {
            position: absolute;
            font-size: 11px;
            color: #808080;
            top: 10px;
            transform: translateX(-50%);
        }

        .user-guess-indicator {
            position: absolute;
            width: 1px;
            height: 40px;
            background: #ffffff;
            top: -19px;
            opacity: 0.7;
        }

        .answer-arrow {
            position: absolute;
            width: 1px;
            height: 40px;
            background: #4ade80;
            top: -19px;
            opacity: 0;
            pointer-events: none;
        }

        .answer-arrow.show {
            opacity: 1;
        }

        .answer-popup {
            position: absolute;
            bottom: 50px;
            left: 50%;
            transform: translateX(-50%);
            background: #252525;
            border: 1px solid #444;
            border-radius: 8px;
            padding: 12px;
            min-width: 200px;
            text-align: center;
            pointer-events: none;
            opacity: 0;
            z-index: 10;
        }

        .answer-popup.show {
            opacity: 1;
        }

        .answer-popup.correct {
            border-color: #4ade80;
            box-shadow: 0 0 12px rgba(74, 222, 128, 0.3);
        }

        .answer-popup.incorrect {
            border-color: #ef4444;
            box-shadow: 0 0 12px rgba(239, 68, 68, 0.3);
        }

        .btn-submit {
            background: #ffffff;
            color: #000;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
            font-weight: 600;
        }

        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(255, 255, 255, 0.2);
        }

        .btn-submit:active {
            transform: translateY(0);
        }

        .btn-submit:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .fade-in {
            opacity: 0;
        }

        h1 {
            color: #ffffff;
            font-weight: 700;
        }

        .logo-title {
            letter-spacing: -1.5px;
            font-weight: 800;
            text-transform: lowercase;
            font-size: 2rem;
            color: #ffffff;
        }

        h2 {
            color: #ffffff;
            font-weight: 600;
        }

        h3 {
            color: #ffffff;
            font-weight: 700;
        }

        p {
            color: #a0a0a0;
        }

        .text-gray-500 {
            color: #808080 !important;
        }

        .text-gray-600 {
            color: #707070 !important;
        }

        .text-gray-700 {
            color: #606060 !important;
        }

        .bg-gray-50 {
            background: #252525 !important;
        }

        .bg-gradient-to-r {
            background: #ffffff !important;
            color: #000 !important;
        }

        /* Responsive design */
        @media (max-width: 767px) {
            body {
                padding: 1rem;
            }

            .quiz-card {
                max-width: 100%;
                padding: 2rem;
            }
        }

        @media (min-width: 768px) {
            body {
                padding: 2rem;
            }

            .quiz-card {
                max-width: 100%;
                width: 100%;
                max-height: 90vh;
                overflow-y: auto;
                padding: 3rem;
            }
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">
    <!-- Main card container -->
    <div class="quiz-card rounded-xl shadow-2xl max-w-2xl w-full p-8 relative">
        <!-- USSR Easter Egg Logo -->
        <div id="ussrLogo" class="absolute top-6 right-6 text-7xl opacity-0 pointer-events-none text-red-600">☭</div>
        
        <!-- Header -->
        <div class="text-center mb-12">
            <h1 class="logo-title mb-2">historyguessr</h1>
            <div class="text-sm text-gray-500">
                <span id="correctCount">0</span>/<span id="totalCount">0</span>
            </div>
        </div>

        <!-- Timeline visualization -->
        <div class="mb-12">
            <div id="timelineContainer" class="relative">
                <div class="timeline-line">
                    <div class="timeline-tick" style="left: 0%;"></div>
                    <div class="timeline-tick" style="left: 25%;"></div>
                    <div class="timeline-tick" style="left: 50%;"></div>
                    <div class="timeline-tick" style="left: 75%;"></div>
                    <div class="timeline-tick" style="left: 100%;"></div>
                    
                    <div class="timeline-label" style="left: 0%;">1900</div>
                    <div class="timeline-label" style="left: 25%;">1925</div>
                    <div class="timeline-label" style="left: 50%;">1950</div>
                    <div class="timeline-label" style="left: 75%;">1975</div>
                    <div class="timeline-label" style="left: 100%;">2000</div>
                    
                    <div id="userMarker" class="user-guess-indicator" style="left: 50%;"></div>
                    <div id="correctMarker" class="answer-arrow" style="left: 50%;"></div>
                </div>
                <div id="answerPopup" class="answer-popup"></div>
            </div>
        </div>

        <!-- Event question -->
        <div id="eventContainer" class="fade-in text-center mb-12">
            <h3 id="eventQuestion" class="text-3xl mb-2">Loading event...</h3>
            <p id="eventHint" class="text-sm text-gray-600">Place this event on the timeline</p>
        </div>

        <!-- Year slider -->
        <div class="mb-8">
            <div class="flex justify-between text-xs text-gray-600 mb-3">
                <span>1900</span>
                <span id="selectedYear" class="text-white font-semibold">1950</span>
                <span>2000</span>
            </div>
            <div class="flex items-center gap-3">
                <button id="yearDecrement" class="flex-shrink-0 w-10 h-10 bg-gray-700 hover:bg-gray-600 rounded-lg flex items-center justify-center text-white font-bold transition-colors">
                    ←
                </button>
                <input type="range" id="yearSlider" min="1900" max="2000" value="1950" step="1" class="flex-1">
                <button id="yearIncrement" class="flex-shrink-0 w-10 h-10 bg-gray-700 hover:bg-gray-600 rounded-lg flex items-center justify-center text-white font-bold transition-colors">
                    →
                </button>
            </div>
        </div>

        <!-- Submit button -->
        <button id="submitBtn" class="btn-submit w-full py-3 px-6 rounded-lg font-semibold mb-6 transition-all">
            Check Answer
        </button>

        <!-- Feedback area -->
        <div id="feedbackContainer" class="min-h-8 flex items-center justify-center mb-4">
            <div id="feedback" class="text-center text-sm"></div>
        </div>

        <!-- Next button -->
        <button id="nextBtn" class="w-full bg-white text-black font-semibold py-3 px-6 rounded-lg hidden transition-all duration-300 hover:shadow-lg">
            Next Event →
        </button>

        <!-- Stats -->
        <div id="statsArea" class="flex justify-around mt-8 pt-8 border-t border-gray-700 hidden">
            <div class="text-center">
                <div class="text-xl font-bold text-white" id="accuracy">0%</div>
                <div class="text-xs text-gray-600">Accuracy</div>
            </div>
            <div class="text-center">
                <div class="text-xl font-bold text-white" id="eventsCompleted">0</div>
                <div class="text-xs text-gray-600">Completed</div>
            </div>

        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
