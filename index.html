<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
   
    <script src="https://cdn.tailwindcss.com"></script>
   
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&family=Playfair+Display:wght@700;800&display=swap" rel="stylesheet">
    <title>History Timeline Quiz</title>
    <style>

        * {
            font-family: 'Poppins', sans-serif;
        }

        body {
            min-height: 100vh;
            width: 100vw;
            margin: 0;
            padding: 0;
            overflow-x: hidden;
            position: relative;
            /* fallback color */
            background: #000;
        }

        @keyframes blob1 {
            0%, 100% { transform: translate(0, 0) scale(1); }
            33%       { transform: translate(50px, -40px) scale(1.06); }
            66%       { transform: translate(-30px, 55px) scale(0.96); }
        }
        @keyframes blob2 {
            0%, 100% { transform: translate(0, 0) scale(1); }
            40%       { transform: translate(-60px, 45px) scale(1.04); }
            75%       { transform: translate(40px, -35px) scale(0.97); }
        }
        @keyframes blob3 {
            0%, 100% { transform: translate(0, 0) scale(1); }
            50%       { transform: translate(35px, 50px) scale(1.05); }
        }

        .bg-blob {
            position: fixed;
            border-radius: 50%;
            filter: blur(90px);
            pointer-events: none;
            z-index: 0;
            will-change: transform;
        }

        .min-h-screen {
            position: relative;
            z-index: 1;
        }

        .quiz-card {
            background: rgba(26, 26, 26, 0.4);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3), inset 0 0 250px rgba(255, 255, 255, 0.02);
        }

        input[type="range"] {
            appearance: none;
            -webkit-appearance: none;
            width: 100%;
            height: 6px;
            border-radius: 3px;
            background: #333;
            outline: none;
            -webkit-slider-thumb-appearance: none;
        }

        input[type="range"]::-webkit-slider-thumb {
            appearance: none;
            -webkit-appearance: none;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: #ffffff;
            cursor: pointer;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.5);
            transition: all 0.2s ease;
        }

        input[type="range"]::-webkit-slider-thumb:hover {
            transform: scale(1.1);
        }

        input[type="range"]::-moz-range-thumb {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: #ffffff;
            cursor: pointer;
            border: none;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.5);
            transition: all 0.2s ease;
        }

        input[type="range"]::-moz-range-thumb:hover {
            transform: scale(1.1);
        }

        .timeline-line {
            position: relative;
            height: 2px;
            background: #333;
            margin: 2rem 0 1rem 0;
        }

        .timeline-tick {
            position: absolute;
            width: 2px;
            height: 20px;
            background: #555;
            top: -9px;
        }

        .timeline-label {
            position: absolute;
            font-size: 11px;
            color: #808080;
            top: 10px;
            transform: translateX(-50%);
        }

        .user-guess-indicator {
            position: absolute;
            width: 1px;
            height: 40px;
            background: #ffffff;
            top: -19px;
            opacity: 0.7;
        }

        .answer-arrow {
            position: absolute;
            width: 1px;
            height: 40px;
            background: #4ade80;
            top: -19px;
            opacity: 0;
            pointer-events: none;
        }

        .answer-arrow.show {
            opacity: 1;
        }

        .result-dot {
            position: absolute;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            transform: translateX(-50%);
            pointer-events: none;
            opacity: 0;
        }

        .result-dot.correct {
            background: #4ade80;
            box-shadow: 0 0 6px rgba(74, 222, 128, 0.6);
            top: -14px;
        }

        .result-dot.incorrect {
            background: #ef4444;
            box-shadow: 0 0 6px rgba(239, 68, 68, 0.6);
            top: 6px;
        }

        .answer-popup {
            position: absolute;
            bottom: 50px;
            left: 50%;
            transform: translateX(-50%);
            background: #252525;
            border: 1px solid #444;
            border-radius: 8px;
            padding: 12px;
            min-width: 200px;
            text-align: center;
            pointer-events: none;
            opacity: 0;
            z-index: 10;
        }

        .answer-popup.show {
            opacity: 1;
        }

        .answer-popup.correct {
            border-color: #4ade80;
            box-shadow: 0 0 12px rgba(74, 222, 128, 0.3);
        }

        .answer-popup.incorrect {
            border-color: #ef4444;
            box-shadow: 0 0 12px rgba(239, 68, 68, 0.3);
        }

        .btn-submit {
            background: #ffffff;
            color: #000;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
            font-weight: 700;
            font-size: 1rem;
            letter-spacing: 0.5px;
            text-transform: uppercase;
            border-radius: 8px;
        }

        .btn-submit:hover:not(:disabled) {
            transform: translateY(-3px);
            box-shadow: 0 12px 24px rgba(255, 255, 255, 0.3);
            letter-spacing: 1px;
        }

        .btn-submit:active:not(:disabled) {
            transform: translateY(-1px);
        }

        .btn-submit:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        #yearDecrement, #yearIncrement {
            cursor: pointer;
            -webkit-user-select: none;
            -webkit-touch-callout: none;
            user-select: none;
            -webkit-appearance: none;
            appearance: none;
            border: none;
            font-size: 1.2rem;
            transition: all 0.2s ease;
            background: linear-gradient(135deg, #3a3a3c 0%, #2c2c2e 100%);
            border: 1px solid #444;
        }

        #yearDecrement:hover:not(:disabled), #yearIncrement:hover:not(:disabled) {
            background: linear-gradient(135deg, #4a4a4c 0%, #3c3c3e 100%);
            border-color: #555;
            box-shadow: 0 4px 12px rgba(255, 255, 255, 0.1);
            transform: translateY(-2px);
        }

        #yearDecrement:active:not(:disabled), #yearIncrement:active:not(:disabled) {
            transform: scale(0.92);
        }

        #yearDecrement:disabled, #yearIncrement:disabled {
            cursor: not-allowed;
            opacity: 0.4;
        }

        .fade-in {
            opacity: 0;
        }

        h1 {
            color: #ffffff;
            font-weight: 700;
        }

        .logo-title {
            letter-spacing: -1.5px;
            font-weight: 800;
            text-transform: lowercase;
            font-size: 2.5rem;
            color: #ffffff;
            font-family: 'Playfair Display', serif;
            font-style: italic;
            background: linear-gradient(135deg, #ffffff 0%, #d4d4d8 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 0.5rem;
        }

        h2 {
            color: #ffffff;
            font-weight: 700;
            font-size: 1.5rem;
            letter-spacing: -0.5px;
        }

        h3 {
            color: #ffffff;
            font-weight: 700;
            font-size: 1.875rem;
            letter-spacing: -0.3px;
            line-height: 1.3;
        }

        #eventQuestion {
            color: #ffffff;
            font-weight: 700;
            font-size: 1.875rem;
            line-height: 1.4;
            margin-bottom: 0.75rem;
            background: linear-gradient(135deg, #ffffff 0%, #e5e5e5 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        #eventHint {
            color: #a0a0a0;
            font-size: 0.9rem;
            font-weight: 500;
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }

        #correctCount, #totalCount {
            color: #4ade80;
            font-weight: 800;
            font-size: 1.1rem;
        }

        .score-display {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            padding: 0.75rem 1.5rem;
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        #feedbackContainer {
            min-height: 2rem;
            border-radius: 8px;
        }

        #feedbackContainer .text-green-400 {
            font-weight: 700;
            font-size: 1.1rem;
            letter-spacing: 0.5px;
        }

        #feedbackContainer .text-red-400 {
            font-weight: 700;
            font-size: 1.1rem;
            letter-spacing: 0.5px;
        }

        p {
            color: #a0a0a0;
            font-size: 0.95rem;
            line-height: 1.5;
        }

        .text-gray-500 {
            color: #909090 !important;
            font-size: 0.875rem;
        }

        .text-gray-600 {
            color: #7a7a7a !important;
            font-size: 0.875rem;
        }

        .text-gray-700 {
            color: #606060 !important;
        }

        .bg-gray-50 {
            background: #252525 !important;
        }

        .bg-gradient-to-r {
            background: #ffffff !important;
            color: #000 !important;
        }

        /* Responsive design */
        @media (max-width: 767px) {
            body {
                padding: 1rem;
            }

            .quiz-card {
                max-width: 100%;
                padding: 2rem;
            }
        }

        @media (min-width: 768px) {
            body {
                padding: 2rem;
            }

            .quiz-card {
                max-width: 100%;
                width: 100%;
                max-height: 90vh;
                overflow-y: auto;
                padding: 3rem;
            }
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">
    <!-- Atmospheric background blobs -->
    <div class="bg-blob" style="width:520px;height:520px;background:rgba(110,18,18,0.28);top:-140px;left:-140px;animation:blob1 20s ease-in-out infinite;"></div>
    <div class="bg-blob" style="width:600px;height:600px;background:rgba(15,55,75,0.25);bottom:-160px;right:-160px;animation:blob2 25s ease-in-out infinite;"></div>
    <div class="bg-blob" style="width:380px;height:380px;background:rgba(55,18,85,0.20);top:42%;left:38%;animation:blob3 30s ease-in-out infinite;"></div>
    
    <!-- Main card container -->
    <div class="quiz-card rounded-xl shadow-2xl max-w-2xl w-full p-8 relative">
        <!-- USSR Easter Egg Logo -->
        <div id="ussrLogo" class="absolute top-6 right-6 text-7xl opacity-0 pointer-events-none text-red-600">☭</div>
        
        <!-- Header -->
        <div class="text-center mb-12">
            <h1 class="logo-title mb-2">historyguessr</h1>
            <div class="text-sm text-gray-500">
                <span id="correctCount">0</span>/<span id="totalCount">0</span>
            </div>
        </div>

        <!-- Timeline visualization -->
        <div class="mb-12">
            <div id="timelineContainer" class="relative">
                <div class="timeline-line">
                    <div class="timeline-tick" style="left: 0%;"></div>
                    <div class="timeline-tick" style="left: 25%;"></div>
                    <div class="timeline-tick" style="left: 50%;"></div>
                    <div class="timeline-tick" style="left: 75%;"></div>
                    <div class="timeline-tick" style="left: 100%;"></div>
                    
                    <div class="timeline-label" style="left: 0%;">1900</div>
                    <div class="timeline-label" style="left: 25%;">1925</div>
                    <div class="timeline-label" style="left: 50%;">1950</div>
                    <div class="timeline-label" style="left: 75%;">1975</div>
                    <div class="timeline-label" style="left: 100%;">2000</div>
                    
                    <div id="userMarker" class="user-guess-indicator" style="left: 50%;"></div>
                    <div id="correctMarker" class="answer-arrow" style="left: 50%;"></div>
                </div>
                <div id="answerPopup" class="answer-popup"></div>
            </div>
        </div>

        <!-- Event question -->
        <div id="eventContainer" class="fade-in text-center mb-12">
            <h3 id="eventQuestion" class="text-3xl mb-2">Loading event...</h3>
            <p id="eventDescription" class="text-sm text-gray-500 mb-3" style="display:none;"></p>
            <p id="eventHint" class="text-sm text-gray-600">SELECT THE CORRECT DATE</p>
        </div>

        <!-- Year slider -->
        <div class="mb-8">
            <div class="flex justify-between text-xs text-gray-600 mb-3">
                <span>1900</span>
                <span id="selectedYear" class="text-white font-semibold">1950</span>
                <span>2000</span>
            </div>
            <div class="flex items-center gap-3">
                <button type="button" id="yearDecrement" class="flex-shrink-0 w-10 h-10 bg-gray-700 hover:bg-gray-600 rounded-lg flex items-center justify-center text-white font-bold transition-colors">
                    ←
                </button>
                <input type="range" id="yearSlider" min="1900" max="2000" value="1950" step="1" class="flex-1">
                <button type="button" id="yearIncrement" class="flex-shrink-0 w-10 h-10 bg-gray-700 hover:bg-gray-600 rounded-lg flex items-center justify-center text-white font-bold transition-colors">
                    →
                </button>
            </div>
        </div>

        <!-- Button overlay container -->
        <div class="relative h-14 mb-6">
            <button id="submitBtn" class="btn-submit w-full py-3 px-6 rounded-lg font-semibold transition-all absolute inset-0">
                Check Answer
            </button>
            <button id="nextBtn" class="btn-submit w-full py-3 px-6 rounded-lg font-semibold transition-all absolute inset-0 hidden">
                Next Event →
            </button>
        </div>

        <!-- Feedback area -->
        <div id="feedbackContainer" class="min-h-8 flex items-center justify-center mb-4">
            <div id="feedback" class="text-center text-sm"></div>
        </div>

        <!-- Stats -->
        <div id="statsArea" class="flex justify-around mt-8 pt-8 border-t border-gray-700 hidden">
            <div class="text-center">
                <div class="text-xl font-bold text-white" id="accuracy">0%</div>
                <div class="text-xs text-gray-600">Accuracy</div>
            </div>
            <div class="text-center">
                <div class="text-xl font-bold text-white" id="eventsCompleted">0</div>
                <div class="text-xs text-gray-600">Completed</div>
            </div>

        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
